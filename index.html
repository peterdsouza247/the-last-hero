/* ================================================================ rng */

function mulberry32(a) {
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
const seedParam = new URLSearchParams(location.search).get("seed");
const rand = mulberry32(seedParam ? (parseInt(seedParam, 10) || 1) : (Date.now() & 0xffffffff));
const R = {
  random: () => rand(),
  randint: (a, b) => a + Math.floor(rand() * (b - a + 1)),
  choice: (arr) => arr[Math.floor(rand() * arr.length)],
  sample: (arr, n) => {
    const copy = arr.slice(), out = [];
    for (let i = 0; i < n && copy.length; i++)
      out.push(copy.splice(Math.floor(rand() * copy.length), 1)[0]);
    return out;
  },
};

const choicesEl = document.getElementById("choices");
const statusbar = document.getElementById("statusbar");

function scrollDown() {
  window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
}
function el(cls, text) {
  const d = document.createElement("div");
  d.className = cls;
  d.textContent = text;
  log.appendChild(d);
  scrollDown();
  return d;
}
const say   = (t) => el("p", t);
const quote = (t) => el("q", t);
const note  = (t) => el("note", t);
const grim  = (t) => el("grim", t);
const omen  = (t) => el("omen", t);
const li    = (t) => el("li", t);
const header = (t) => el("hdr", t);
function hr() {
  const h = document.createElement("hr");
  h.className = "rulebreak";
  log.appendChild(h);
}

function choose(prompt, options) {
  // options: [label, value] or [label, value, "dark"]
  return new Promise((resolve) => {
    if (prompt) {
      const p = document.createElement("div");
      p.className = "prompt";
      p.textContent = prompt;
      choicesEl.appendChild(p);
    }
    options.forEach(([label, value, style]) => {
      const b = document.createElement("button");
      b.className = "opt" + (style === "dark" ? " dark" : "");
      b.textContent = label;
      b.onclick = () => {
        choicesEl.innerHTML = "";
        if (prompt) el("past", prompt);
        el("chosen", "➤ " + label);
        resolve(value);
      };
      choicesEl.appendChild(b);
    });
    scrollDown();
  });
}

  }
  get capability() { return CAPABILITY[this.cls]; }
  card() {
    const lines = [
      `${this.name}, ${this.cls}. The kind who ${CLASSES[this.cls]}.`,
      `${cap(this.background)}. ${this.virtue} down to the bone, and ${this.vice.toLowerCase()} the same way.`,
      `Came here ${this.motivation}. Sometimes, late, they talk about ${this.relationship}.`,
    ];
    if (this.note) lines.push(this.note);
    if (this.bonds.length) lines.push(`Would walk into fire for ${this.bonds.join(" and ")}.`);
    if (this.wounded) lines.push("Hurt, and pretending otherwise badly.");
    if (this.questDone) lines.push("Their own story is finished. They stay for yours.");
    else if (this.confidence >= 2) lines.push("Moves like someone who has walked out of dark places before.");
    return lines;
  }
}

function makeHero(opts = {}) {
  let vv = R.choice(VIRTUE_VICE);
  if (opts.idealistic) vv = R.choice(IDEALIST_VV);
  if (opts.ruthless) vv = R.choice(RUTHLESS_VV);
  return new Hero({
    name: R.choice(FIRST_NAMES),
    cls: R.choice(Object.keys(CLASSES)),
    background: R.choice(BACKGROUNDS),
    virtue: vv[0], vice: vv[1],
    motivation: R.choice(MOTIVATIONS),
    relationship: R.choice(RELATIONSHIPS),
  });
}

class Mission {
  constructor(t) {
    Object.assign(this, { region: null, personalFor: null, stance: null, dayOut: 0 }, t);
    this.party = this.party || [];
    this.items = this.items || [];
    this.events = this.events || R.sample(COMPLICATIONS, 2);
  }
  title() { return cap(this.problem); }
}

/* ================================================================ game */

class Game {
  constructor() {
    this.day = 1;
    this.roster = [];
    this.armory = R.sample(ITEMS, 5).map(([name, why, fx]) => ({ name, why, fx: { ...fx } }));
    this.visitors = [];
    this.pending = [];
    this.active = [];
    this.chronicle = [];
    this.rumours = [];
    this.adviceTally = Object.fromEntries(Object.keys(STANCES).map((k) => [k, 0]));
    this.renown = 0;
    this.sparedEnemies = [];
    this.alliesWon = 0;
    this.regions = REGION_DEFS.map(([name, desc]) => ({ name, desc, health: 3 }));
    this.dread = 0;
    this.shadowRumourIdx = 0;
    this.omensSeen = [];
    this.scouted = false;
    this.finaleOffered = false;
    this.over = false;
    this.fallen = [];        // memorials: {name, cls, background, motivation, place}
    this.turnedAway = 0;
    this.ending = null;      // {tier, title, line, forced}
  }

  /* ---------------- persistence */

  save() {
    const heroPlain = (h) => ({ ...h });
    const missionPlain = (m) => ({
      problem: m.problem, place: m.place, region: m.region,
      opposition: m.opposition, needs: m.needs, danger: m.danger,
      stance: m.stance, dayOut: m.dayOut, events: m.events,
      personalFor: m.personalFor,
      partyIds: m.party.map((h) => h.id),
      items: m.items,
    });
    const allHeroes = new Map();
    const collect = (h) => allHeroes.set(h.id, h);
    this.roster.forEach(collect);
    this.visitors.forEach(([h]) => collect(h));
    this.pending.forEach(([h, m]) => { collect(h); m.party.forEach(collect); });
    this.active.forEach((m) => m.party.forEach(collect));
    const data = {
      day: this.day, renown: this.renown, dread: this.dread,
      adviceTally: this.adviceTally, rumours: this.rumours,
      chronicle: this.chronicle, sparedEnemies: this.sparedEnemies,
      alliesWon: this.alliesWon, regions: this.regions,
      shadowRumourIdx: this.shadowRumourIdx, omensSeen: this.omensSeen,
      scouted: this.scouted, finaleOffered: this.finaleOffered,
      fallen: this.fallen, turnedAway: this.turnedAway,
      armory: this.armory,
      heroes: [...allHeroes.values()].map(heroPlain),
      rosterIds: this.roster.map((h) => h.id),
      visitors: this.visitors.map(([h, m]) => ({ heroId: h.id, mission: missionPlain(m) })),
      pending: this.pending.map(([h, m]) => ({ heroId: h.id, mission: missionPlain(m) })),
      active: this.active.map(missionPlain),
      heroIdCounter,
    };
    try { localStorage.setItem(SAVE_KEY, JSON.stringify(data)); } catch (e) { /* private mode etc. */ }
  }

  static load() {
    let data;
    try { data = JSON.parse(localStorage.getItem(SAVE_KEY)); } catch (e) { return null; }
    if (!data || data.over) return null;
    const g = new Game();
    const byId = new Map();
    heroIdCounter = data.heroIdCounter || 1;
    for (const hp of data.heroes) {
      const h = Object.assign(Object.create(Hero.prototype), hp);
      byId.set(h.id, h);
    }
    const reviveMission = (mp) => {
      const m = Object.assign(Object.create(Mission.prototype), mp);
      m.party = (mp.partyIds || []).map((id) => byId.get(id)).filter(Boolean);
      m.items = mp.items || [];
      delete m.partyIds;
      return m;
    };
    Object.assign(g, {
      day: data.day, renown: data.renown, dread: data.dread,
      adviceTally: data.adviceTally, rumours: data.rumours,
      chronicle: data.chronicle, sparedEnemies: data.sparedEnemies,
      alliesWon: data.alliesWon || 0, regions: data.regions,
      shadowRumourIdx: data.shadowRumourIdx, omensSeen: data.omensSeen,
      scouted: data.scouted, finaleOffered: data.finaleOffered,
      fallen: data.fallen || [], turnedAway: data.turnedAway || 0,
      armory: data.armory,
      roster: data.rosterIds.map((id) => byId.get(id)).filter(Boolean),
      visitors: data.visitors.map((v) => [byId.get(v.heroId), reviveMission(v.mission)]),
      pending: data.pending.map((v) => [byId.get(v.heroId), reviveMission(v.mission)]),
      active: data.active.map(reviveMission),
    });
    return g;
  }

  static clearSave() { try { localStorage.removeItem(SAVE_KEY); } catch (e) {} }

  /* ---------------- helpers */

  philosophy() {
    const total = Object.values(this.adviceTally).reduce((a, b) => a + b, 0);
    if (total < 3) return null;
    let top = null;
    for (const k of Object.keys(this.adviceTally))
      if (top === null || this.adviceTally[k] > this.adviceTally[top]) top = k;
    return this.adviceTally[top] > 0 ? top : null;
  }

  record(text) { this.chronicle.push([this.day, text]); }

  region(name) { return this.regions.find((r) => r.name === name); }

  regionWord(r) {
    return ["fallen", "desperate", "struggling", "holding on", "steady", "thriving"][r.health];
  }

  bumpRegion(name, delta) {
    const r = this.region(name);
    if (!r) return;
    const before = r.health;
    r.health = Math.max(0, Math.min(5, r.health + delta));
    if (r.health === 0 && before > 0) {
      grim(`» Word comes at dusk, the way bad word always does. ${r.name} has gone over to lawlessness and dark. The Shadow drinks deep from places like that.`);
      this.record(`${r.name} fell.`);
    }
  }

  dreadWord() {
    if (this.dread < 15) return "the east lies quiet";
    if (this.dread < 30) return "something is wrong in the east";
    if (this.dread < 50) return "the east is going dark";
    if (this.dread < 70) return "the Shadow gathers";
    if (this.dread < 90) return "the Shadow is coming";
    return "the Shadow is at the door";
  }

  updateStatus() {
    statusbar.style.display = "block";
    const phil = this.philosophy();
    statusbar.innerHTML =
      `<span class="chip">Day <b>${this.day}</b></span>` +
      `<span class="chip">Renown <b>${this.renown}</b></span>` +
      (phil ? `<span class="chip"><b>${PHILOSOPHY[phil][0]}</b></span>` : "") +
      `<span class="chip east">${this.scouted ? "Shadow " + this.dread + "/100" : cap(this.dreadWord())}</span>`;
  }

  /* ---------------- day cycle */

  async newDay() {
    this.day += 1;

    let growth = 2;
    for (const r of this.regions) if (r.health === 0) growth += 1;
    this.dread = Math.min(100, this.dread + growth);

    while (this.shadowRumourIdx < SHADOW_RUMOURS.length &&
           this.dread >= SHADOW_RUMOURS[this.shadowRumourIdx][1]) {
      this.rumours.push(SHADOW_RUMOURS[this.shadowRumourIdx][0]);
      this.shadowRumourIdx += 1;
    }
    if (R.random() < 0.7) {
      const r = R.choice(RUMOURS);
      if (!this.rumours.includes(r)) this.rumours.push(r);
    }
    this.rumours = this.rumours.slice(-5);

    for (const h of this.roster) {
      if (h.wounded && !h.onMission && R.random() < 0.4) {
        h.wounded = false;
        note(`» ${h.name} is on their feet again, testing the mend of it, pretending they were never down.`);
      }
    }

    if (R.random() < 0.65 && this.visitors.length < 2) this.arriveVisitor();

    if (this.sparedEnemies.length && R.random() < 0.3) {
      const name = this.sparedEnemies.shift();
      const h = makeHero();
      h.name = name;
      h.note = "Your heroes had them beaten and let them stand up. Nobody forgets the hand that could have been a blade.";
      this.roster.push(h);
      this.alliesWon += 1;
      note(`» ${name} stands in your doorway. The enemy your heroes spared, come back with the debt in both hands, asking to serve. You find the decision was made the day you gave your advice.`);
      this.record(`${name}, once an enemy, joined the Hall.`);
    }

    this.maybePersonalQuest();

    if (this.dread >= 50 && R.random() < 0.35) {
      const r = R.choice(this.regions.filter((x) => x.health > 0));
      if (r) {
        this.bumpRegion(r.name, -1);
        if (r.health > 0) omen(`» Travellers say ${r.name} is ${this.regionWord(r)} now. The roads out there feel longer than they used to, and nobody jokes about why.`);
      }
    }

    await this.maybeOmen();

    for (const m of [...this.active]) await this.advanceMission(m);

    if (this.dread >= 100 && !this.over) {
      await this.finale(true);
      return;
    }
    this.save();
  }

  maybePersonalQuest() {
    const candidates = this.roster.filter(
      (h) => h.alive && !h.onMission && !h.questDone && h.confidence >= 2 && !h.wounded);
    if (!candidates.length || R.random() > 0.35) return;
    if (this.pending.some(([, m]) => m.personalFor) ||
        this.visitors.some(([, m]) => m.personalFor) ||
        this.active.some((m) => m.personalFor)) return;
    const h = R.choice(candidates);
    const region = R.choice(this.regions.filter((r) => r.health > 0)) || this.regions[0];
    const m = new Mission({
      problem: `${h.name}'s reckoning. They came here ${h.motivation}, and the debt has come due`,
      place: `the road where ${h.relationship} waits`, region: region.name,
      opposition: "the past. It does not bargain",
      needs: [h.capability, "heart"], danger: 3,
      personalFor: h.id,
    });
    m.party.push(h);
    h.onMission = true;
    this.pending.push([h, m]);
    note(`» ${h.name} finds you alone by the fire, and for once looks their age. "I came here ${h.motivation}. Tonight the past caught up with me. Help me end it. Please." (The Council Table. It prepares like any other mission. It is not any other mission.)`);
  }

  async maybeOmen() {
    const thresholds = [
      [20, "A monk arrives from the east. Barefoot. His order's seal is burned into a strip of leather around his wrist, because the seal itself is ash now, along with everything it sealed. He says his monastery no longer has mornings. Just a lightening of the dark, and then less of one. He asks for nothing. He walked all this way so that one person outside the Eastmarch would know."],
      [45, "Refugees reach your gates at dusk. Forty of them, and quiet in a way no crowd should ever be quiet. Among them is a girl who draws the same picture over and over with a burnt stick: a door standing open in a field, and something long and patient coming through."],
      [70, "An old soldier rides into the yard and does not dismount. He looks at your hall the way men look at things they are memorizing. \"Whatever you are going to do,\" he says, \"the east cannot wait for you to feel ready. Nobody who ever did anything felt ready.\" He leaves his sword on your step and rides west, and does not look back."],
    ];
    for (const [t, text] of thresholds) {
      if (this.dread >= t && !this.omensSeen.includes(t)) {
        this.omensSeen.push(t);
        header("An Omen");
        omen(text);
        const act = await choose("The Hall looks to you. What answer do you give the dark?", [
          ["Send scouts east. You would rather know than wonder.", "scout"],
          ["Double the watch and keep the Hall's work going. Fear spreads faster than any shadow.", "steady"],
          ["Set the Library digging. This has happened before. Everything has.", "study"],
        ]);
        if (act === "scout") {
          this.scouted = true;
          note("From tonight, your scouts keep count of the dark. The number will not comfort you. It was never meant to. But you will know, and knowing is a kind of armour.");
          this.record("Scouts were sent east. What they saw is not written here.");
        } else if (act === "steady") {
          this.renown += 1;
          note("The Hall does not flinch. People see that. They stand a little straighter for it, and they tell others, and the telling grows. Renown rises.");
          this.record("The Hall stood steady while the east went dark.");
        } else {
          this.dread = Math.max(0, this.dread - 4);
          note("Three nights of candle smoke and water-stained histories, and the librarian finds it. The mistake the last age made, written down by the survivors in a margin nobody read. You will not repeat it. Somewhere far to the east, the dark loses a step and does not understand why.");
          this.record("The Library unearthed the old age's mistake in time to refuse it.");
        }
        await pause();
      }
    }
  }

  arriveElara() {
    const h = new Hero({
      name: "Elara", cls: "Ranger", background: "a hunter's daughter",
      virtue: "Brave", vice: "Inexperienced",
      motivation: "to find her missing father",
      relationship: "a father lost in the Blackwood",
      isElara: true,
    });
    h.note = "Nineteen. A worn bow, a hunting knife, a travel cloak two sizes too big. Her hands are steady. Her voice is not.";
    const m = new Mission({
      problem: "a hunter has gone missing in the Blackwood",
      place: "the Blackwood", region: "The Blackwood",
      opposition: "wolves, and the older things that wear the dark like a coat",
      needs: ["wilds", "battle"], danger: 3,
    });
    this.visitors.push([h, m]);
    header("A Visitor");
    say("She comes in with the storm. Nineteen, maybe, with a hunter's bow across her back and rain running off her as if the sky has spent the whole day trying to drown her. She plants her feet the way brave people do when they are terrified.");
    quote('"They say you crossed the Blackwood once and came out breathing. My father went in nine days ago. So tell me the truth, because everyone else has stopped meeting my eyes. If I follow his trail, do I come back out?"');
    say("(She waits at the Council Table. They always wait. It is the hoping that never learns to.)");
  }

  arriveVisitor() {
    const phil = this.philosophy();
    const h = makeHero({
      idealistic: phil === "cautious" || phil === "diplomatic",
      ruthless: phil === "ruthless",
    });
    const troubled = this.regions.filter((r) => r.health <= 1 && r.health > 0);
    let t;
    if (troubled.length && R.random() < 0.5) {
      const r = R.choice(troubled);
      const pool = MISSION_TEMPLATES.filter((x) => x.region === r.name);
      t = pool.length ? R.choice(pool) : R.choice(MISSION_TEMPLATES);
    } else {
      t = R.choice(MISSION_TEMPLATES);
    }
    const m = new Mission({ ...t });
    const reg = this.region(m.region);
    if (reg && reg.health <= 1) m.danger += 1;
    this.visitors.push([h, m]);
    note(`» ${h.name}, a ${h.cls.toLowerCase()}, arrives with mud to the knee and a story that will not keep: ${m.problem}. (The Council Table.)`);
  }

  /* ---------------- mission mechanics */

  partyScore(m) {
    let score = 0;
    for (const h of m.party) {
      if (m.needs.includes(h.capability)) score += 2;
      score += Math.min(h.confidence, 2);
      if (h.wounded) score -= 1;
    }
    for (const h of m.party)
      if (m.party.some((x) => x !== h && h.bonds.includes(x.name))) { score += 1; break; }
    for (const it of m.items)
      for (const [k, v] of Object.entries(it.fx)) {
        if (k === "single_use" || k === "dawn") continue;
        if (m.needs.includes(k)) score += v;
      }
    return score;
  }

  async advanceMission(m) {
    m.dayOut += 1;
    const names = m.party.map((h) => h.name).join(", ");
    if (m.dayOut <= m.events.length) {
      const [text, bestStance, helpful] = m.events[m.dayOut - 1];
      header(`Word from the Road, Day ${m.dayOut}`);
      say(`(${names}, somewhere out past ${m.place}.)`);
      say(text);
      quote(this.resolveEvent(m, bestStance, helpful));
      await pause();
    } else {
      await this.resolveMission(m);
    }
  }

  resolveEvent(m, bestStance, helpful) {
    const roll = R.randint(1, 6);
    let bonus = 0;
    const actor = R.choice(m.party);
    const notes = [];
    if (m.stance === bestStance) {
      bonus += 2;
      notes.push(`Your voice is in their heads at the worst moment, which is what advice is for. ${STANCES[m.stance][2]}`);
    }
    const helper = m.party.find((h) => h.capability === helpful);
    if (helper) {
      bonus += 2;
      notes.push(`${helper.name} ${CLASSES[helper.cls]}, and out here that is worth more than gold.`);
    }
    for (const it of m.items)
      if ((it.fx[helpful] || 0) > 0) { bonus += 1; notes.push(`${it.name} earns its keep.`); break; }
    if (m.party.some((h) => m.party.some((x) => x !== h && h.bonds.includes(x.name))))
      bonus += 1;
    if (R.random() < 0.35) {
      if (roll + bonus >= 5) notes.push(`${actor.name} is ${actor.virtue.toLowerCase()} exactly when it counts.`);
      else notes.push(`${actor.name} is ${actor.vice.toLowerCase()} at the worst possible moment, the way people are.`);
    }
    if (roll + bonus >= 5) {
      m.danger -= 1;
      notes.push("They come through it harder to kill than they went in.");
    } else if (roll + bonus <= 2) {
      m.danger += 1;
      actor.wounded = true;
      notes.push(`It goes wrong. ${actor.name} leaves blood on that road.`);
    } else {
      notes.push("They scrape through with their lives and not much else.");
    }
    return notes.join(" ");
  }

  async resolveMission(m) {
    header("The Return");
    const names = m.party.map((h) => h.name).join(", ");
    let score = this.partyScore(m) + R.randint(1, 6) - m.danger;
    if (m.stance === "bold") score += 1;
    for (const h of m.party) h.onMission = false;
    this.active = this.active.filter((x) => x !== m);
    for (const it of m.items) {
      if (it.fx.single_use) say(`(${it.name} was spent somewhere on that road. Some things are made to be used exactly once, and this was the once.)`);
      else this.armory.push(it);
    }
    if (score >= 4) this.missionTriumph(m, names);
    else if (score >= 1) this.missionCostly(m, names);
    else if (score >= -2) this.missionFailForward(m, names);
    else this.missionDisaster(m, names);
    this.maybeBond(m);
    await pause();
  }

  maybeBond(m) {
    const alive = m.party.filter((h) => h.alive);
    if (alive.length < 2 || R.random() > 0.4) return;
    const [a, b] = R.sample(alive, 2);
    if (a.bonds.includes(b.name)) return;
    a.bonds.push(b.name);
    b.bonds.push(a.name);
    note(`» That road did something to ${a.name} and ${b.name}. They sit close at meals now and hardly talk. They are past needing to.`);
    this.record(`${a.name} and ${b.name} came back bound to each other.`);
  }

  missionTriumph(m, names) {
    say(`${names} come home to torchlight and cheering, to their names sung badly and joyfully in the yard.`);
    say(`The matter of ${m.problem} is finished. Finished well, which is rarer.`);
    this.renown += 2;
    this.bumpRegion(m.region, 1);
    if (m.region === "The Eastmarch") {
      this.dread = Math.max(0, this.dread - 8);
      omen("And in the east, for one night at least, the dark gives back a mile.");
    }
    for (const h of m.party) { h.confidence += 1; h.deeds.push(m.title()); }
    if (m.personalFor) {
      const h = m.party.find((x) => x.id === m.personalFor);
      if (h) {
        h.questDone = true;
        h.confidence += 1;
        h.note = "Settled the matter that drove them here. What is left now is choice, and they choose this.";
        note(`» ${h.name} came here ${h.motivation}. That story ended tonight, out on the road, the way the best ones end: quietly, and paid in full. And still they stay. There is a word for people who stay when they no longer need you. The word is family.`);
        this.record(`${h.name} settled their own matter and chose to remain.`);
      }
    }
    this.record(`${names} resolved this: ${m.problem}. The Hall's name grew heavier in the world's mouth.`);
    if ((m.stance === "diplomatic" || m.stance === "cautious") && R.random() < 0.6) {
      const name = R.choice(FIRST_NAMES);
      quote(`Later, away from the fire, one of them tells you the part that stayed out of the songs. "We had their leader face down in the mud. ${name}, they were called. We let them stand up and walk away. Watch the roads. Debts like that come home."`);
      this.sparedEnemies.push(name);
    } else if (R.random() < 0.4) {
      const r = makeHero();
      r.note = `Watched what the Hall's people did out at ${m.place}, and walked away from a whole life to follow them home.`;
      this.roster.push(r);
      quote(`Someone lingers in the doorway behind the returning party, half in the rain. "This is ${r.name}. They saw what we did out there. They want to become a hero." Another judgment, then. They never stop coming, and you would not want them to.`);
    }
  }

  missionCostly(m, names) {
    say(`${names} come back with the job done and something gone from behind their eyes.`);
    say(`The matter of ${m.problem} is settled. The road took its toll on the way.`);
    this.renown += 1;
    const h = R.choice(m.party);
    h.wounded = true;
    h.confidence += 1;
    grim(`${h.name} took the worst of it. The body will mend on the Hall's good food and enforced boredom. The rest keeps its own calendar.`);
    if (m.personalFor) {
      const p = m.party.find((x) => x.id === m.personalFor);
      if (p) {
        p.questDone = true;
        p.note = "Their own matter is settled, at a price they never once discuss.";
        this.record(`${p.name} settled their own matter, at a price.`);
      }
    }
    if (m.region === "The Eastmarch") this.dread = Math.max(0, this.dread - 4);
    this.record(`${names} settled this at a cost: ${m.problem}. ${h.name} carried the worst of it home.`);
  }

  missionFailForward(m, names) {
    say(`${names} come home with empty hands and full silence.`);
    grim(`Out at ${m.place}, the problem is still breathing. Worse: it has learned it can win.`);
    this.bumpRegion(m.region, -1);
    if (m.personalFor) {
      const p = m.party.find((x) => x.id === m.personalFor);
      if (p) {
        p.questDone = true;
        p.confidence = Math.max(0, p.confidence - 1);
        p.note = "Went to settle their own past and came back without an ending. Some doors close themselves, and you stand in the road listening to the bolt go home.";
        grim(`${p.name} does not talk about what they found on that road. Or about what they didn't.`);
        this.record(`${p.name}'s own matter ended without an answer.`);
        return;
      }
    }
    const follow = new Mission({
      problem: m.problem + ", worse now and bolder",
      place: m.place, region: m.region,
      opposition: m.opposition,
      needs: m.needs, danger: m.danger + 1,
    });
    const carrier = makeHero();
    carrier.note = `Came from ${m.place} carrying the bad news, because someone had to.`;
    this.visitors.push([carrier, follow]);
    this.rumours.push(`They say things out at ${m.place} are worse since the Hall failed there. They say it where you can hear.`);
    this.record(`${names} failed at this: ${m.problem}. The failure did not stay quiet. Failures never do.`);
    note(`» Bad news rides a faster horse than good. Before nightfall, someone new stands at your door with the same story, told heavier.`);
  }

  missionDisaster(m, names) {
    grim(`Of the party you sent to ${m.place}, this is what the road gives back:`);
    const dead = R.choice(m.party);
    dead.alive = false;
    this.fallen.push({ name: dead.name, cls: dead.cls, background: dead.background,
                       motivation: dead.motivation, place: m.place });
    this.roster = this.roster.filter((h) => h.alive);
    for (const h of this.roster)
      h.bonds = h.bonds.map((n) => (n === dead.name ? `${dead.name} (gone)` : n));
    const survivors = m.party.filter((h) => h.alive);
    for (const h of survivors) h.wounded = true;
    if (survivors.length)
      li(survivors.map((h) => h.name).join(", ") + `. Wounded, hollow-eyed, carrying ${dead.name}'s effects wrapped in a cloak.`);
    else li("No one.");
    grim(`${dead.name}. ${cap(dead.background)}, who came here ${dead.motivation} and will not now do either. Somewhere out there, ${dead.relationship} is waiting for a letter. The writing of it falls to you. It does not get easier. You would worry about yourself if it did.`);
    this.renown -= 1;
    this.bumpRegion(m.region, -1);
    this.record(`${dead.name} died at ${m.place}. The problem, ${m.problem}, is still out there.`);
    this.rumours.push(`A candle burns beneath ${dead.name}'s portrait in the Hall. Nobody has seen who keeps lighting it.`);
    const mourner = survivors.find((h) => h.bonds.some((n) => n.startsWith(dead.name)));
    if (mourner)
      grim(`${mourner.name} carries it worst. They were close, the way people get close when a road has tried to kill them together. The Hall gives them room.`);
  }

  /* ---------------- rooms */

  async councilTable() {
    header("The Council Table");
    const opts = [];
    this.visitors.forEach(([h, m], i) =>
      opts.push([`Hear ${h.name} out. (${m.title().toLowerCase()}.)`, ["visitor", i]]));
    this.pending.forEach(([h, m], i) =>
      opts.push([(m.personalFor ? `Help ${h.name} face what is waiting for them.` : `Make ready: ${m.title().toLowerCase()}.`), ["prepare", i]]));
    if (this.dread >= 70 || this.day >= 30) {
      opts.push(["March east. End the Shadow, or be ended. There is no third road left.", ["finale", null], "dark"]);
    }
    if (!opts.length) {
      say("The table is bare tonight. Curled maps, candle stubs, the ghost-ring of an old wine cup. Someone will come. Someone always comes.");
      return;
    }
    opts.push(["Step away from the table.", ["back", null]]);
    const [kind, idx] = await choose("Who has your attention?", opts);
    if (kind === "visitor") await this.talkToVisitor(idx);
    else if (kind === "prepare") await this.prepareMission(idx);
    else if (kind === "finale") await this.finale(false);
  }

  async talkToVisitor(idx) {
    const [h, m] = this.visitors[idx];
    header(h.name);
    for (const line of h.card()) say(line);
    const reg = this.region(m.region);
    say(`The trouble they carry: ${m.problem}, out at ${m.place}. Standing in the way: ${m.opposition}.`);
    if (reg) say(`That is ${reg.name} country. ${cap(this.regionWord(reg))}, by every account that reaches you.`);
    say("How bad it truly is, nobody can tell you. The librarian might come closer than most.");
    const action = await choose(
      "Three questions. Always the same three, worn smooth as river stones. Can you trust them. Can they win. And what will they become, after.", [
      ["Give them the Hall's word. Their trouble is yours now, and so are they.", "accept"],
      ["Take them in, but hold the mission back. Some fires need to be watched before they are fed.", "recruit"],
      ["Turn them away. The Hall cannot carry everything, and pretending otherwise kills people.", "reject"],
      ["Say nothing yet. Let them wait a little longer in the warm.", "later"],
    ]);
    if (action === "accept") {
      this.visitors.splice(idx, 1);
      this.roster.push(h);
      m.party.push(h);
      h.onMission = true;
      this.pending.push([h, m]);
      say(`${h.name} lets out a breath they have been holding since your door. "Thank you," they say, and mean it more than the words can hold. Preparations wait at the Council Table.`);
    } else if (action === "recruit") {
      this.visitors.splice(idx, 1);
      this.roster.push(h);
      this.record(`${h.name} joined the Hall, their errand set aside to wait.`);
      say(`${h.name} joins the Hall, and tries to look glad of it. Out at ${m.place}, the trouble stays where you left it. Untended things grow. It is the one law that never sleeps.`);
      this.bumpRegion(m.region, -1);
      this.rumours.push(`Things out at ${m.place} are said to be getting worse.`);
    } else if (action === "reject") {
      this.visitors.splice(idx, 1);
      this.turnedAway += 1;
      this.record(`You turned ${h.name} away. Their trouble went with them into the dark.`);
      say(`${h.name} nods once, like someone who worked out the answer on the walk here and hoped all the same. Then they are through the door and into the weather, and you never learn how their story ends. That is the cost of a door you keep. Not the ones you let in. The ones you don't.`);
      this.bumpRegion(m.region, -1);
    }
    this.save();
  }

  async prepareMission(idx) {
    const [, m] = this.pending[idx];
    header(`Preparation: ${m.title()}`);
    const available = this.roster.filter(
      (h) => !h.onMission && h.alive && !m.party.includes(h));
    while (m.party.length < 3 && available.length) {
      const opts = available.map((h) => [
        `${h.name} the ${h.cls} · ${h.virtue}, ${h.vice.toLowerCase()}`
        + (h.wounded ? " · hurt" : "")
        + (m.party.some((p) => p.bonds.includes(h.name)) ? " · bound to this party" : ""), h]);
      opts.push(["No one else. The road is theirs.", null]);
      const pick = await choose(
        `Walking out: ${m.party.map((x) => x.name).join(", ")}. Who walks with them?`, opts);
      if (!pick) break;
      m.party.push(pick);
      available.splice(available.indexOf(pick), 1);
    }
    if (this.armory.length) {
      const opts = this.armory.map((it) => [`${it.name} · ${it.why}.`, it]);
      opts.push(["Nothing. The Armory keeps its own. Tomorrow may need it more.", null]);
      const it = await choose("One thing from the Armory may go with them. Old things like to be needed.", opts);
      if (it) {
        this.armory.splice(this.armory.indexOf(it), 1);
        m.items.push(it);
        say(`${m.party[0].name} takes ${it.name} in both hands, careful, the way you hold a thing that might be listening.`);
      }
    }
    say("Packs shouldered. Cloaks drawn. At the door they stop, all of them at once, and look back at you. This is the moment. It is always this moment. Everything else you gave them can be dropped, stolen, broken. This goes with them all the way down.");
    const stance = await choose('"What do you tell them before they leave?"',
      Object.keys(STANCES).map((k) => [`"${STANCES[k][1]}"`, k]));
    m.stance = stance;
    this.adviceTally[stance] += 1;
    for (const h of m.party) h.onMission = true;
    this.pending.splice(idx, 1);
    this.active.push(m);
    const names = m.party.map((h) => h.name).join(", ");
    say(`${names} go out under a low grey sky, toward ${m.place}. The door swings shut. The Hall is larger and colder for it, the way it always is, the way you never say aloud.`);
    this.record(`${names} set out: ${m.problem}. Your last words to them: ${STANCES[stance][0].toLowerCase()}.`);
    const phil = this.philosophy();
    if (phil && this.adviceTally[phil] === 3) {
      const [name, desc] = PHILOSOPHY[phil];
      note(`» The world has started telling stories about you. Not the missions. You. In the taverns they call you ${name}. ${desc}`);
      this.record(`Word spread of the Hall's master. They call you ${name}.`);
    }
    this.save();
  }

  armoryRoom() {
    header("The Armory");
    if (!this.armory.length) {
      say("Empty racks and clean dust-shadows where things used to hang. Everything you own is out in the world, doing work. That is the only honest place for any of it.");
      return;
    }
    say("Nothing in this room has a price. Everything in it has a story, which is worse, because stories collect interest.");
    for (const it of this.armory) {
      li(`• ${it.name} · ${it.why}.` + (it.fx.dawn ? " (It hates the dark. The dark knows.)" : ""));
    }
  }

  async library() {
    header("The Library");
    quote('The librarian does not look up. She turns a page with a gloved finger and says, "Ask."');
    const subjects = [];
    for (const [, m] of [...this.visitors, ...this.pending])
      subjects.push([`About ${m.place}. (${m.title().toLowerCase()}.)`, m]);
    for (const m of this.active) subjects.push([`About the party out past ${m.place}.`, m]);
    subjects.push(["About the east. About the thing nobody names at dinner.", "shadow", "dark"]);
    subjects.push(["Nothing today.", null]);
    const m = await choose("What do you ask her?", subjects);
    if (!m) { quote('"Then stop letting the door swing. The books feel drafts. They complain."'); return; }
    if (m === "shadow") {
      quote("She stops. She closes the book she was reading, clears a whole table, and lays out three volumes you have never once seen her touch. She puts on a second pair of gloves to do it.");
      quote('"It has come before. The histories agree on nothing about it except the ending, and they agree on that the way frightened people agree: word for word. It was not beaten by armies. Armies fed it. It was beaten by a handful who walked in with the dawn at their backs. Heroes it could not teach to be afraid. Things it could not teach to go dark. And at the front of them, a name that meant something. A name people had decided to believe in."');
      li("Settled hearts weigh most against it. The confident. The bonded. The ones whose own stories are already finished.");
      li("Certain old relics matter in the dark. She taps the wall toward the Armory. Twice. Precisely.");
      li("And allies made out of enemies count double. The Shadow has never once understood mercy. It has lost to it every single time.");
      if (this.dread >= 70) quote('"It is close now. You feel it after sundown. I know you do. So does everyone in this hall, and they are all watching to see what you feel about it."');
      return;
    }
    const needsWords = {
      battle: "good steel and a spine behind it", wilds: "someone the land cannot lie to",
      lore: "someone who can read what the old things left",
      heart: "a gentle hand that does not shake", shadow: "a quiet one",
      words: "a voice that can open doors without touching them",
    };
    const hints = m.needs.map((n) => needsWords[n]);
    quote(`"${cap(m.place)}." She pulls a ledger from beneath the desk without looking for it. "What that business wants is ${hints.join(", and ")}. Send anything less and you are sending an apology with legs."`);
    if (m.danger >= 4) quote('"And hear this once, because I will not say it twice. The people who go to that place unprepared do not come back to complain about it."');
    else if (m.danger <= 2) quote('"Honestly? Half the danger out there is rumour. Mind, the other half still bites."');
    else quote('"Dangerous enough. Not hopeless. Like most things worth a candle."');
  }

  mapTable() {
    header("The Map Table");
    say("Six regions under pinned vellum. Wax drips, little flags, a burn mark shaped like a thumb. Someone keeps this table honest, and it costs them sleep.");
    for (const r of this.regions) {
      const line = `${r.name}: ${this.regionWord(r)}. ${cap(r.desc)}.`;
      if (r.health === 0) grim("• " + line);
      else if (r.health <= 2) el("li", "• " + line).style.color = "var(--danger)";
      else li("• " + line);
    }
    omen(this.scouted ? `The east: your scouts mark the dark at ${this.dread} of 100. The number climbs like something patient.` : `The east: ${this.dreadWord()}.`);
  }

  dormitory() {
    header("The Dormitory");
    if (!this.roster.length) {
      say("Rows of empty beds, blankets folded to a soldier's edge. Waiting. A dormitory is just a promise the Hall makes to people it has not met yet.");
      return;
    }
    for (const h of this.roster) {
      const lines = h.card();
      say(lines[0] + (h.onMission ? " (Out on the roads.)" : ""));
      for (const l of lines.slice(1)) li(l);
    }
  }

  chronicleRoom() {
    header("The Chronicle");
    if (!this.chronicle.length) {
      say("The great book lies open at a blank page, and the blankness is not empty. It is expectant. The first story is yours to cause.");
      return;
    }
    for (const [day, text] of this.chronicle.slice(-14)) li(`Day ${day}. ${text}`);
    const phil = this.philosophy();
    if (phil) say(`The chronicler has given this volume a title, in the careful hand of someone who knows titles outlive their subjects: '${PHILOSOPHY[phil][0]}'.`);
  }

  entrance() {
    this.updateStatus();
    header(`The Hall, Day ${this.day}`);
    say(R.choice(FLAVOUR));
    if (this.dread >= 30 && R.random() < 0.5)
      omen(R.choice([
        "Conversations near the east windows have developed a way of trailing off.",
        "The fire burns as well as ever. People sit closer to it than they used to, and nobody mentions it.",
        "There is a new habit in the Hall: touching the door-post on the way out. For luck. Nobody started it. Everybody does it.",
      ]));
    if (this.rumours.length) {
      say("Heard around the Hall, in the way of all halls:");
      for (const r of this.rumours) li(`• "${r}"`);
    }
    if (this.visitors.length)
      say(`Waiting at the Council Table, turning their caps in their hands: ${this.visitors.map(([h]) => h.name).join(", ")}.`);
    if (this.active.length)
      say(`Out on the roads tonight: ${this.active.length} ${this.active.length === 1 ? "party" : "parties"}. You catch yourself listening for the door.`);
  }

  /* ---------------- the finale */

  finaleStrength(party, items) {
    let s = 0;
    for (const h of party) {
      s += 1 + Math.min(h.confidence, 3);
      if (h.questDone) s += 2;
      if (party.some((x) => x !== h && h.bonds.includes(x.name))) s += 1;
      if (h.wounded) s -= 1;
    }
    const caps = new Set(party.map((h) => h.capability));
    s += caps.size;
    for (const it of items) if (it.fx.dawn) s += 2;
    s += this.alliesWon * 2;
    s += Math.floor(this.renown / 3);
    s += Math.floor(this.regions.reduce((a, r) => a + r.health, 0) / 6);
    const phil = this.philosophy();
    if (phil === "cautious" || phil === "diplomatic") s += 1;
    if (phil === "curious") s += 1;
    return s;
  }

  async finale(forced) {
    this.finaleOffered = true;
    header("The Last Mission");
    if (forced) {
      grim("You waited, and the waiting is spent. The Shadow has crossed out of the Eastmarch, and there is no more east left to lose. The Hall empties itself onto the road, not because anyone gave an order, but because there is nothing left to stand behind except each other.");
    } else {
      say("You have decided. It feels less like deciding than like noticing a decision that has been standing behind you for weeks. The Hall goes east. Not to hold a line. To end the thing that draws all lines toward it.");
    }
    const available = this.roster.filter((h) => h.alive && !h.onMission && !h.wounded);
    const anyHero = this.roster.filter((h) => h.alive && !h.onMission);
    let pool = available.length ? available : anyHero;
    const party = [];
    if (!pool.length) {
      grim("And here is the arithmetic, bitter as anything the dark ever did: there is no one left to send. The beds are empty. The portraits are many. The dormitory is a promise the Hall can no longer keep.");
    } else {
      say("Choose who walks into the dark. Choose the way you have chosen all along, with your eyes open. There is no second march.");
      while (party.length < 4 && pool.length) {
        const opts = pool.map((h) => [
          `${h.name} the ${h.cls} · ${h.virtue}, ${h.vice.toLowerCase()}`
          + (h.questDone ? " · settled heart" : "")
          + (h.wounded ? " · hurt" : "")
          + (party.some((p) => p.bonds.includes(h.name)) ? " · bound to this party" : ""), h]);
        if (party.length >= 1) opts.push(["The party is chosen. Enough.", null]);
        const pick = await choose(
          party.length ? `Marching: ${party.map((x) => x.name).join(", ")}. Who else?` : "Who leads them?", opts);
        if (!pick) break;
        party.push(pick);
        pool = pool.filter((h) => h !== pick);
      }
    }
    const items = [];
    let armory = [...this.armory];
    while (items.length < 2 && armory.length) {
      const opts = armory.map((it) => [
        `${it.name} · ${it.why}.` + (it.fx.dawn ? " ✦" : ""), it]);
      opts.push([items.length ? "Enough. Weight slows the living." : "Nothing. They carry themselves, and that has always been the Hall's true armory.", null]);
      const it = await choose("What goes with them into the dark? Two hands. Two things.", opts);
      if (!it) break;
      items.push(it);
      armory = armory.filter((x) => x !== it);
    }
    let stance = null;
    if (party.length) {
      say("At the east gate they stop and look back, the way every party you have ever sent has stopped and looked back. All your campaigns, all your judgments, all your quiet evenings by the fire have worn down to this: one habit. One question.");
      stance = await choose('"What do you tell them before they leave?"',
        Object.keys(STANCES).map((k) => [`"${STANCES[k][1]}"`, k]));
      this.adviceTally[stance] += 1;
    }
    await pause();

    let strength = this.finaleStrength(party, items);
    if (forced) strength -= 2;

    // Act 1
    header("The Road East");
    say("The land changes a day out. Colour goes first. Then birdsong. Then the quiet understanding that roads lead somewhere, which turns out to have been a belief all along, and beliefs can be taken. They walk through villages where the doors stand open and the kettles sit cold on dead fires.");
    if (party.length) {
      const guide = party.find((h) => h.capability === "wilds");
      if (guide) { strength += 1; say(`${guide.name} keeps them to the old paths, the ones the dark has not learned yet. The old paths remember feet. They are glad of the company.`); }
      if (stance === "cautious") { strength += 1; say("They go carefully. Out here, carefulness is a lantern all its own."); }
      if (stance === "bold") say("They go fast. Speed is a kind of courage, and something out in the grey is watching to see what kind they carry.");
    }
    await pause();

    // Act 2
    header("The Door in the Field");
    say("It is exactly what the refugee girl kept drawing. A door, standing open in a field with no house around it, and the long dark coming through like water finding a crack it has been promised for a thousand years.");
    if (party.length) {
      const reader = party.find((h) => h.capability === "lore");
      if (reader) {
        strength += 2;
        say(`There is writing on the doorframe, and ${reader.name} reads it aloud with rain on their face: the old age's mistake, carved as a warning by whoever crawled out of it alive. The words change nothing about the dark. They change everything about the people facing it.`);
      } else {
        say("There is writing on the doorframe. Old, deep, deliberate. No one in the party can read it. Whatever the last age wanted them to know, they will have to learn it the way the last age did.");
      }
      if (this.alliesWon > 0)
        note(`And then, out of the grey where nothing should be moving, ${this.alliesWon === 1 ? "a figure your heroes once spared comes to stand" : this.alliesWon + " figures your heroes once spared come to stand"} beside them, exactly where it counts. The Shadow has never understood mercy. It is about to lose to it again.`);
    }
    await pause();

    // Act 3
    header("The Last Hero");
    const roll = R.randint(1, 6);
    const total = strength + roll;
    const leader = party[0];
    let tier;
    if (!party.length) tier = "night";
    else if (total >= 22) tier = "dawn";
    else if (total >= 15) tier = "hardwon";
    else if (total >= 9) tier = "pyrrhic";
    else tier = "night";

    if (tier !== "night") {
      say(`${leader.name} goes through the door last, ${items.length ? items.map((i) => i.name).join(" and ") + " in hand" : "empty-handed and unbowed"}. What happens on the other side, the Chronicle can only guess at. No two accounts of it agree, and the people who were there just look at each other when asked, the way survivors do.`);
      if (tier === "dawn" && party.length > 1)
        say("This much is agreed, because a hundred people stood in the cold and watched it: they all walked back out. All of them. Into a sunrise that came up gold for the first time in a season, as if the sky had been saving it.");
    }
    await pause();

    // Epilogue
    header("Epilogue");
    const phil = this.philosophy();
    const title = phil ? PHILOSOPHY[phil][0] : "the Keeper of the Hall";
    if (tier === "dawn") {
      note("THE DAWN COMES.");
      say("The door is shut. The land remembers how to have mornings, slowly, the way a numb hand remembers warmth. In the years after, the people who resettle the Eastmarch plant lantern-trees at their gates. Nobody explains the custom. Everybody keeps it.");
      say(`The Chronicle's last page names every hero who marched, first name and true name both. It closes with a single line about you, ${title}: "They asked the right questions of the right people. Then, and this mattered more, they stood aside and let the answers be brave."`);
      this.record("The Shadow was ended. The dawn came up gold.");
    } else if (tier === "hardwon") {
      note("A HARD-WON DAWN.");
      const lost = party.length > 1 ? R.choice(party.slice(1)) : null;
      if (lost) {
        lost.alive = false;
        this.fallen.push({ name: lost.name, cls: lost.cls, background: lost.background,
                           motivation: lost.motivation, place: "the Door in the Field" });
        grim(`The door is shut. The price is written in one empty chair at the Hall's long table. ${lost.name}, who came here ${lost.motivation}, and finished a far bigger story instead. The chair stays. Nobody moves it. Nobody ever will.`);
        this.record(`The Shadow was ended. ${lost.name} did not come home.`);
      } else {
        say("The door is shut, at a cost the survivors carry in the pauses between their sentences.");
        this.record("The Shadow was ended, at cost.");
      }
      say(`The east heals the way people heal: slowly, crookedly, stronger at the broken places and strange there too. The Chronicle calls you ${title}. The bards get most of the story wrong. The ones who were there let them, because the wrong version is easier to sleep after.`);
    } else if (tier === "pyrrhic") {
      grim("THE LONG GREY.");
      say("The door is not shut. It is narrowed. Wedged with courage and paid for in names the Chronicle needs three pages to hold. The Shadow is not ended. It has been taught, for the first time in its long cold life, to wait. Teaching it cost everything it cost.");
      say(`The Hall stands. The watch goes on. And somewhere down the west road, right now, a new ranger is walking toward your gate through the rain. Nineteen, soaked through, rehearsing the question. You will lie to her less than most would, ${title}. That is what you have instead of victory, and some nights it is almost enough.`);
      this.record("The Shadow was held, not beaten. The watch continues.");
    } else {
      grim("THE LONG NIGHT.");
      say("The histories of what came next are written in other lands, by people who heard it third-hand and softened it for the children. The east went out like a lamp. Then the border towns. And the last light anyone swears to, the detail that survives every retelling because no one has the heart to cut it, is a hall on a hill. Windows burning. Doors open. Taking people in until the dark reached the very step.");
      say(`No Chronicle of yours survives. The refugees carry the story out instead, and retell it until it hardens into something like scripture. The Hall never closed. Say whatever else you like about its master, ${title}. It never closed.`);
      this.record("The night came. The Hall's doors stayed open to the last.");
    }
    await pause();

    const ENDINGS = {
      dawn:    ["The Dawn Comes", "The Shadow was ended. The dawn came up gold."],
      hardwon: ["A Hard-Won Dawn", "The Shadow was ended, and the price is an empty chair at the long table."],
      pyrrhic: ["The Long Grey", "The Shadow was held, not beaten. The watch continues."],
      night:   ["The Long Night", "The night came. The Hall's doors stayed open to the last."],
    };
    this.ending = { tier, title: ENDINGS[tier][0], line: ENDINGS[tier][1], forced,
                    marchers: party.map((h) => h.name), stance };

    header("The Chronicle Closes");
    say(`${this.chronicle.length} entries. ${this.day} days. ${this.roster.filter((h) => h.alive).length + party.filter((h) => h.alive && !this.roster.includes(h)).length} heroes still breathing, which is the only census that ever mattered.`);
    say("It records, in part:");
    for (const [day, text] of this.chronicle.slice(-8)) li(`Day ${day}. ${text}`);
    this.over = true;
    Game.clearSave();
    for (;;) {
      const pick = await choose("", [
        ["Bind the Chronicle and take it with you. (Download the tale of this campaign.)", "download"],
        ["Light the fire again. A new campaign.", "again"],
      ]);
      if (pick !== "download") break;
      this.downloadChronicle();
      note("The tale is bound and sealed and yours. (It waits in your downloads, the way books wait.)");
    }
    location.reload();
  }

  /* ---------------- the bound chronicle (export) */

  achievements() {
    const wins = this.chronicle.filter(([, t]) => t.includes("resolved this")).length;
    const bonds = this.chronicle.filter(([, t]) => t.includes("came back bound")).length;
    const settled = this.chronicle.filter(([, t]) => t.includes("settled their own matter")).length;
    const thriving = this.regions.filter((r) => r.health >= 5).length;
    const ruined = this.regions.filter((r) => r.health === 0).length;
    const a = [];
    a.push([this.ending.title, this.ending.line]);
    const phil = this.philosophy();
    if (phil) a.push([PHILOSOPHY[phil][0], "The name the world chose for you, one piece of advice at a time."]);
    if (this.alliesWon >= 1) a.push(["Mercy, Weaponized", `${this.alliesWon} ${this.alliesWon === 1 ? "enemy" : "enemies"} your heroes spared came back to stand beside them. The Shadow never understood it. It lost to it.`]);
    if (this.fallen.length === 0 && this.day >= 10) a.push(["Everyone Came Home", "Not one candle beneath the portraits. Not one letter you had to write."]);
    if (this.fallen.length >= 3) a.push(["The Candle Row", `${this.fallen.length} portraits with candles beneath them. The Hall remembers every one.`]);
    if (bonds >= 1) a.push(["Forged on the Road", `${bonds} ${bonds === 1 ? "friendship" : "friendships"} made out on roads that were trying to kill them.`]);
    if (settled >= 1) a.push(["Settled Hearts", `${settled} ${settled === 1 ? "hero" : "heroes"} finished their own story under your roof, and stayed anyway.`]);
    if (thriving >= 1) a.push(["A Land Worth Saving", `${thriving} ${thriving === 1 ? "region" : "regions"} thriving when the Chronicle closed.`]);
    if (ruined >= 1) a.push(["Scars on the Map", `${ruined} ${ruined === 1 ? "region" : "regions"} fell on your watch. The maps will say so for a long time.`]);
    if (this.renown >= 10) a.push(["A Name With Weight", `Renown of ${this.renown}. Taverns argue about you now.`]);
    if (this.scouted) a.push(["Eyes in the East", "You chose to know rather than wonder. The number never comforted you. It was never meant to."]);
    if (wins >= 5) a.push(["The Hall Delivers", `${wins} troubles resolved outright. Finished well, which is rarer.`]);
    if (this.turnedAway === 0 && this.day >= 10) a.push(["The Door Never Closed", "You never once turned a visitor away."]);
    return a;
  }

  downloadChronicle() {
    const esc = (s) => String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    const phil = this.philosophy();
    const title = phil ? PHILOSOPHY[phil][0] : "the Keeper of the Hall";
    const living = this.roster.filter((h) => h.alive);
    const adviceRows = Object.keys(STANCES)
      .filter((k) => this.adviceTally[k] > 0)
      .sort((x, y) => this.adviceTally[y] - this.adviceTally[x])
      .map((k) => `<tr><td>"${esc(STANCES[k][1])}"</td><td>${this.adviceTally[k]} ${this.adviceTally[k] === 1 ? "time" : "times"}</td></tr>`)
      .join("");
    const achievementItems = this.achievements()
      .map(([name, desc]) => `<li><b>${esc(name)}.</b> ${esc(desc)}</li>`).join("");
    const heroItems = living
      .map((h) => `<li><b>${esc(h.name)}</b>, ${esc(h.cls)}. ${esc(cap(h.background))}, who came here ${esc(h.motivation)}.${h.deeds.length ? " Deeds: " + esc(h.deeds.join("; ")) + "." : ""}</li>`)
      .join("");
    const fallenItems = this.fallen
      .map((f) => `<li><b>${esc(f.name)}</b>, ${esc(f.cls)}. ${esc(cap(f.background))}, who came here ${esc(f.motivation)} and fell at ${esc(f.place)}.</li>`)
      .join("");
    const regionItems = this.regions
      .map((r) => `<li><b>${esc(r.name)}:</b> ${esc(this.regionWord(r))}.</li>`).join("");
    const chronicleItems = this.chronicle
      .map(([d, t]) => `<li><span class="day">Day ${d}.</span> ${esc(t)}</li>`).join("");
    const marchers = this.ending.marchers.length
      ? `<p>Those who marched east: <b>${esc(this.ending.marchers.join(", "))}</b>.` +
        (this.ending.stance ? ` Your last words to them: <i>"${esc(STANCES[this.ending.stance][1])}"</i>` : "") + `</p>`
      : "<p>No one was left to march. The Hall itself was the last hero.</p>";

    const html = `<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Last Hero: ${esc(this.ending.title)}</title>
<style>
  body { margin: 0; background: #14100c; color: #d8c9a3;
    font-family: Georgia, "Times New Roman", serif; font-size: 17px; line-height: 1.65; }
  .page { max-width: 680px; margin: 0 auto; padding: 60px 24px 100px; }
  h1 { font-variant: small-caps; letter-spacing: 6px; color: #e0a84a; font-weight: normal;
    text-align: center; font-size: 32px; margin: 0 0 4px; }
  .sub { text-align: center; color: #8a7a5c; font-style: italic; margin-bottom: 8px; }
  .ending { text-align: center; color: #e0a84a; font-variant: small-caps;
    letter-spacing: 3px; font-size: 21px; margin: 30px 0 6px; }
  .endline { text-align: center; color: #8a7a5c; font-style: italic; }
  h2 { font-variant: small-caps; letter-spacing: 3px; color: #e0a84a; font-weight: normal;
    font-size: 19px; margin: 44px 0 4px; }
  h2::after { content: ""; display: block; height: 1px; margin-top: 8px;
    background: linear-gradient(90deg, #e0a84a, transparent); opacity: .5; }
  ul { padding-left: 20px; margin: 12px 0; }
  li { margin: 8px 0; }
  b { color: #eadfc0; font-weight: normal; font-variant: small-caps; letter-spacing: 1px; }
  .day { color: #8a7a5c; font-style: italic; }
  table { border-collapse: collapse; margin: 12px 0; width: 100%; }
  td { padding: 6px 10px; border-bottom: 1px solid #3a2f20; }
  td:last-child { text-align: right; color: #8a7a5c; white-space: nowrap; }
  .fallen li { color: #c96b4a; }
  .fallen b { color: #d98d70; }
  .closing { margin-top: 50px; text-align: center; color: #8a7a5c; font-style: italic; }
</style></head><body><div class="page">
  <h1>The Last Hero</h1>
  <div class="sub">the bound chronicle of a campaign of ${this.day} days</div>
  <div class="ending">${esc(this.ending.title)}</div>
  <div class="endline">${esc(this.ending.line)}${this.ending.forced ? " The march east was not chosen. It was forced, at the last." : ""}</div>
  <h2>Of Its Keeper</h2>
  <p>The world came to call you <b>${esc(title)}</b>. Renown of ${this.renown}, ${this.turnedAway === 0 ? "and not one visitor ever turned from the door" : this.turnedAway + (this.turnedAway === 1 ? " visitor" : " visitors") + " turned from the door, and never learned how their stories ended"}.</p>
  ${marchers}
  <h2>Deeds &amp; Honours</h2>
  <ul>${achievementItems}</ul>
  <h2>The Words That Left With Them</h2>
  <p>Everything else could be dropped, stolen, broken. This went with them all the way down.</p>
  <table>${adviceRows || "<tr><td>No advice was ever given.</td><td></td></tr>"}</table>
  ${heroItems ? `<h2>Those Still Breathing</h2><ul>${heroItems}</ul>` : ""}
  ${fallenItems ? `<h2>The Candle Row</h2><p>Portraits with candles beneath them. Nobody has seen who keeps lighting them.</p><ul class="fallen">${fallenItems}</ul>` : ""}
  <h2>The State of the Land</h2>
  <ul>${regionItems}</ul>
  <h2>The Chronicle Entire</h2>
  <ul>${chronicleItems || "<li>The pages are blank. Some campaigns are lived too fast for ink.</li>"}</ul>
  <div class="closing">Say whatever else you like about its master. The Hall never closed.</div>
</div></body></html>`;

    const blob = new Blob([html], { type: "text/html" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `the-last-hero-${this.ending.tier}-day${this.day}.html`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 5000);
  }

  /* ---------------- the story so far */

  async recap() {
    header("The Story So Far");
    say(`Day ${this.day}. The fire kept in. The Chronicle open exactly where you left it, because some things in this world can still be trusted.`);

    const phil = this.philosophy();
    if (phil) say(`The world has made up its mind about you. In the taverns they call you ${PHILOSOPHY[phil][0]}, and your renown stands at ${this.renown}.`);
    else if (this.renown > 0) say(`Your renown stands at ${this.renown}. The world is still deciding what to call you.`);

    const living = this.roster.filter((h) => h.alive);
    if (living.length) {
      const away = living.filter((h) => h.onMission);
      const home = living.filter((h) => !h.onMission);
      if (home.length)
        say(`Under your roof tonight: ${home.map((h) => h.name).join(", ")}.`);
      if (away.length)
        say(`Out on the roads, where your words are all they carry of you: ${away.map((h) => h.name).join(", ")}.`);
      const wounded = living.filter((h) => h.wounded);
      if (wounded.length)
        quote(`${wounded.map((h) => h.name).join(" and ")} ${wounded.length === 1 ? "is" : "are"} still mending, and still pretending otherwise.`);
    } else {
      say("The dormitory stands empty. A dormitory is just a promise the Hall makes to people it has not met yet.");
    }

    if (this.visitors.length)
      say(`Waiting at the Council Table, turning their caps in their hands: ${this.visitors.map(([h]) => h.name).join(", ")}.`);

    const fallen = this.chronicle.filter(([, t]) => t.includes("died at")).length;
    if (fallen)
      grim(`${fallen === 1 ? "One candle burns" : fallen + " candles burn"} beneath the portraits. Nobody has seen who keeps lighting them.`);

    const hurting = this.regions.filter((r) => r.health <= 1);
    if (hurting.length)
      say(`The Map Table makes no apologies: ${hurting.map((r) => r.name).join(" and ")} ${hurting.length === 1 ? "is" : "are"} in a bad way.`);

    omen(`And to the east: ${this.scouted ? "your scouts mark the dark at " + this.dread + " of 100, and the number climbs like something patient" : this.dreadWord()}.`);

    if (this.chronicle.length) {
      say("The Chronicle's freshest ink:");
      for (const [day, text] of this.chronicle.slice(-4)) li(`Day ${day}. ${text}`);
    }
    await pause();
  }

  /* ---------------- main loop */

  async run(isNew) {
    if (isNew) {
      say("The Hall is yours now. Six rooms, one fire, and a door that is never barred. Heroes will find that door. They will be young, or ruined, or lying, or all three, and every one of them will ask you for something. You will judge them. You will arm them. And at the last moment, at the threshold, you will give them the only thing that ever truly leaves this place with them.");
      say("Words. Just words. It will turn out they were the sharpest thing in the Armory all along.");
      omen("One more thing, which you do not know yet. Far to the east, under hills whose names have been deliberately forgotten, something old has finished its long sleep. You have a season. Maybe less. Spend it on people. Nothing else you gather will matter in the end, and no one will believe that until the end arrives.");
      await pause();
      this.arriveElara();
    } else {
      await this.recap();
    }
    while (!this.over) {
      this.entrance();
      const action = await choose("Where do you go?", [
        ["The Council Table, where the asking happens.", "council"],
        ["The Map Table, to look the land in the eye.", "map"],
        ["The Armory, among the things with stories.", "armory"],
        ["The Library, to trade questions with the librarian.", "library"],
        ["The Dormitory, to walk among your people.", "dorm"],
        ["The Chronicle, to read what the days have written.", "chronicle"],
        ["Bank the fire and sleep. Let the next day come.", "sleep"],
      ]);
      if (action === "council") await this.councilTable();
      else if (action === "map") this.mapTable();
      else if (action === "armory") this.armoryRoom();
      else if (action === "library") await this.library();
      else if (action === "dorm") this.dormitory();
      else if (action === "chronicle") this.chronicleRoom();
      else if (action === "sleep") {
        hr();
        say("Night. The Hall settles around its fires, beam by beam, like an old dog turning circles before it lies down.");
        await this.newDay();
      }
    }
  }
}

/* ================================================================ boot */

async function boot() {
  const saved = Game.load();
  if (saved) {
    const pick = await choose(`An older campaign still smoulders in the grate. (Day ${saved.day}.)`, [
      ["Take it up where you left it.", "continue"],
      ["Rake out the ashes. Begin again.", "new", "dark"],
    ]);
    if (pick === "continue") {
      await saved.run(false);
      return;
    }
    Game.clearSave();
  }
  const g = new Game();
  g.save();
  await g.run(true);
}

boot();
</script>
</body>
</html>
